name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality checks ──────────────────────────────────────────
  quality:
    name: Lint, test, verify
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ~/.pub-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: flutter analyze --fatal-infos

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: Test
        run: flutter test

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Check lockfile
        run: flutter pub get --enforce-lockfile

  # ── Build APKs & publish releases ───────────────────────────
  build-apk:
    name: Build APK
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PUB_CACHE: ~/.pub-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # One APK per CPU architecture (smaller downloads than a fat APK)
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs for release
        id: apk
        run: |
          OUT="build/app/outputs/flutter-apk"
          RELEASE_DIR="$OUT/release-named"
          mkdir -p "$RELEASE_DIR"

          # Pick a filename prefix based on the git ref
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PREFIX="utang-tracker-${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            PREFIX="utang-tracker-latest"
          else
            PREFIX="utang-tracker"
          fi

          # Copy each APK with a friendly name:
          #   app-arm64-v8a-release.apk → utang-tracker-v1.0.0-arm64-v8a.apk
          count=0
          for src in "$OUT"/app-*-release.apk; do
            [ -f "$src" ] || continue

            base=$(basename "$src")
            abi="${base#app-}"
            abi="${abi%-release.apk}"

            dest="$RELEASE_DIR/${PREFIX}-${abi}.apk"
            cp "$src" "$dest"
            echo "Prepared $dest"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "No split APKs found in $OUT"
            ls -la "$OUT" || true
            exit 1
          fi

          echo "glob=$RELEASE_DIR/${PREFIX}-*.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utang-tracker-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 14

      # Tag push (v1.0.0) → versioned release for in-app force update
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ steps.apk.outputs.glob }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Split APKs by CPU architecture (smaller downloads).

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `*-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `*-armeabi-v7a.apk` |
            | Emulators (x86_64) | `*-x86_64.apk` |

      # Push to main → rolling "latest" prerelease (not used for force-update)
      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.glob }}
          fail_on_unmatched_files: true
          body: |
            Continuous split APKs from `main` (prerelease; not used for force-update checks).

            - Commit: `${{ github.sha }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `utang-tracker-latest-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `utang-tracker-latest-armeabi-v7a.apk` |
            | Emulators (x86_64) | `utang-tracker-latest-x86_64.apk` |

            For user-facing updates, tag a version:
            `git tag v1.0.1 && git push origin v1.0.1`
