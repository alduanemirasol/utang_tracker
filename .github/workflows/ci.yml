name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Verify format
        run: dart format --output=none --set-exit-if-changed .

      - name: Verify lockfile
        run: flutter pub get --enforce-lockfile

  build-apk:
    name: Build APK
    needs: quality
    runs-on: ubuntu-latest
    # Releases need write access to create/update GitHub Releases.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Smaller downloads: one APK per CPU architecture (not a fat universal APK).
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Name APKs for release
        id: apk
        run: |
          OUT="build/app/outputs/flutter-apk"
          # Flutter outputs: app-armeabi-v7a-release.apk, app-arm64-v8a-release.apk, app-x86_64-release.apk
          mapfile -t SOURCES < <(ls -1 "$OUT"/app-*-release.apk 2>/dev/null || true)
          if [[ ${#SOURCES[@]} -eq 0 ]]; then
            echo "No split APKs found in $OUT"
            ls -la "$OUT" || true
            exit 1
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PREFIX="utang-tracker-${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            PREFIX="utang-tracker-latest"
          else
            PREFIX="utang-tracker"
          fi

          RELEASE_DIR="$OUT/release-named"
          mkdir -p "$RELEASE_DIR"
          for SRC in "${SOURCES[@]}"; do
            BASE="$(basename "$SRC")"
            # app-arm64-v8a-release.apk → arm64-v8a
            ABI="${BASE#app-}"
            ABI="${ABI%-release.apk}"
            DEST="$RELEASE_DIR/${PREFIX}-${ABI}.apk"
            cp "$SRC" "$DEST"
            echo "Prepared $DEST"
          done

          echo "dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          echo "glob=$RELEASE_DIR/${PREFIX}-*.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utang-tracker-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 14

      # Versioned release: push a tag like v1.0.0 (used by in-app force update)
      - name: Publish versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.glob }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Split APKs by CPU architecture (smaller downloads).

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `*-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `*-armeabi-v7a.apk` |
            | Emulators (x86_64) | `*-x86_64.apk` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rolling CI build on main — not used for version comparison in the app
      - name: Publish latest GitHub Release (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Continuous split APKs from `main` (prerelease; not used for force-update checks).

            - Commit: `${{ github.sha }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `utang-tracker-latest-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `utang-tracker-latest-armeabi-v7a.apk` |
            | Emulators (x86_64) | `utang-tracker-latest-x86_64.apk` |

            For user-facing updates, tag a version: `git tag v1.0.1 && git push origin v1.0.1`
          files: ${{ steps.apk.outputs.glob }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
