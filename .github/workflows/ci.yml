name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Verify generated code
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: Run tests
        run: flutter test

  build:
    name: Build Android APKs
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: utang-tracker-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: utang-tracker-apk
          path: apks

      - name: Prepare release files
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            prefix="utang-tracker-$GITHUB_REF_NAME"
          else
            prefix="utang-tracker-latest"
          fi

          mkdir release
          for apk in apks/app-*-release.apk; do
            abi="${apk#apks/app-}"
            abi="${abi%-release.apk}"
            cp "$apk" "release/$prefix-$abi.apk"
          done

      - name: Publish versioned release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release/*.apk
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Split APKs by CPU architecture (smaller downloads).

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `*-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `*-armeabi-v7a.apk` |
            | Emulators (x86_64) | `*-x86_64.apk` |

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: release/*.apk
          fail_on_unmatched_files: true
          body: |
            Continuous split APKs from `main`.

            - Commit: `${{ github.sha }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            | Device | File |
            |--------|------|
            | Most phones (64-bit ARM) | `utang-tracker-latest-arm64-v8a.apk` |
            | Older 32-bit ARM phones | `utang-tracker-latest-armeabi-v7a.apk` |
            | Emulators (x86_64) | `utang-tracker-latest-x86_64.apk` |

            For a versioned user-facing release, tag a version:
            `git tag v1.2.3 && git push origin v1.2.3`
