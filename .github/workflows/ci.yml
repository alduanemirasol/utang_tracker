name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Verify generated code
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: Run tests
        run: flutter test

  prepare_release:
    name: Check release version
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version_code: ${{ steps.version.outputs.version_code }}
      version_name: ${{ steps.version.outputs.version_name }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          current_version=$(sed -n 's/^version: //p' pubspec.yaml)
          if [[ ! "$current_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$ ]]; then
            echo "::error::pubspec.yaml version must use major.minor.patch+build"
            exit 1
          fi

          version_name="${BASH_REMATCH[1]}"
          version_code="${BASH_REMATCH[2]}"
          previous_version=$(git show "${BEFORE_SHA}:pubspec.yaml" | sed -n 's/^version: //p')

          if [[ "$current_version" == "$previous_version" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_code="${previous_version##*+}"
          if [[ ! "$previous_code" =~ ^[0-9]+$ ]] || (( version_code <= previous_code )); then
            echo "::error::Android build number must be greater than $previous_code"
            exit 1
          fi

          release_tag="v$version_name"
          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            echo "::error::Release tag $release_tag already exists"
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build Android APK
    if: needs.prepare_release.outputs.should_release == 'true'
    needs: prepare_release
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          missing=0
          for name in KEYSTORE_BASE64 STORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub Actions signing secret for $name"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "::error::Configure the Android release secrets documented in OTA_UPDATES.md"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/upload-keystore.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: utang-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    name: Publish GitHub release
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: utang-tracker-apk
          path: apks

      - name: Prepare release files
        run: |
          mkdir release
          cp apks/app-release.apk release/utang-tracker.apk

      - name: Create OTA manifest
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          VERSION_CODE: ${{ needs.prepare_release.outputs.version_code }}
          VERSION_NAME: ${{ needs.prepare_release.outputs.version_name }}
        run: |
          sha256=$(sha256sum release/utang-tracker.apk | cut -d ' ' -f 1)
          apk_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/utang-tracker.apk"
          jq -n \
            --argjson versionCode "$VERSION_CODE" \
            --arg versionName "$VERSION_NAME" \
            --arg packageName "com.example.utang_tracker" \
            --arg apkUrl "$apk_url" \
            --arg sha256 "$sha256" \
            --arg releaseNotes "A new version is ready." \
            '{versionCode: $versionCode, versionName: $versionName, packageName: $packageName, apkUrl: $apkUrl, sha256: $sha256, releaseNotes: $releaseNotes, required: false}' \
            > release/update-manifest.json

      - name: Publish versioned release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release/utang-tracker.apk
            release/update-manifest.json
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Install `utang-tracker.apk` manually or update from inside the app.
