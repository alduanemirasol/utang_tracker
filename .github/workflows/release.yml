name: Release Android APKs

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      APP_NAME: utang-tracker
      RELEASE_DIR: release-assets
      RELEASE_NOTES_JSON: assets/release_notes/current.json
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "::error::SIGNING_KEY_BASE64 is empty."
            exit 1
          fi

          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > android/app/release.keystore

          {
            printf 'storePassword=%s\n' "$KEY_STORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=app/release.keystore\n'
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build ABI-split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Prepare release assets
        run: |
          mkdir -p "$RELEASE_DIR"

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "$RELEASE_DIR/$APP_NAME-arm64-v8a-$TAG_NAME.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "$RELEASE_DIR/$APP_NAME-armeabi-v7a-$TAG_NAME.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "$RELEASE_DIR/$APP_NAME-x86_64-$TAG_NAME.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "$RELEASE_DIR/$APP_NAME-universal-$TAG_NAME.apk"

      - name: Generate release notes
        run: |
          if [ ! -f "$RELEASE_NOTES_JSON" ]; then
            echo "::error::$RELEASE_NOTES_JSON not found."
            exit 1
          fi

          tag_version="${TAG_NAME#v}"
          json_version="$(jq -r '.version' "$RELEASE_NOTES_JSON")"

          if [ "$tag_version" != "$json_version" ]; then
            echo "::error::Tag version ($tag_version) does not match release notes version ($json_version)."
            exit 1
          fi

          {
            echo "What's new in $TAG_NAME"
            echo
            jq -r '.notes[] | "- \(.)"' "$RELEASE_NOTES_JSON"
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_DIR }}/*.apk
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
