name: Release Android APKs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: utang-tracker
  RELEASE_DIR: release-assets
  RELEASE_NOTES_JSON: assets/release_notes/current.json
  TAG_NAME: ${{ github.ref_name }}

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify app and release versions
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          APP_VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          NOTES_VERSION=$(jq -r ".version" "$RELEASE_NOTES_JSON")

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version does not match pubspec.yaml."
            exit 1
          fi

          if [ "$TAG_VERSION" != "$NOTES_VERSION" ]; then
            echo "Tag version does not match release notes."
            exit 1
          fi

  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  build:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > android/app/release.keystore

          echo "storePassword=$KEY_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=app/release.keystore" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build ABI APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Prepare release files
        run: |
          mkdir -p "$RELEASE_DIR"

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "$RELEASE_DIR/$APP_NAME-arm64-v8a-$TAG_NAME.apk"

          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "$RELEASE_DIR/$APP_NAME-armeabi-v7a-$TAG_NAME.apk"

          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "$RELEASE_DIR/$APP_NAME-x86_64-$TAG_NAME.apk"

          cp build/app/outputs/flutter-apk/app-release.apk \
            "$RELEASE_DIR/$APP_NAME-universal-$TAG_NAME.apk"

      - name: Generate release notes
        run: |
          echo "What's new in $TAG_NAME" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          jq -r '.notes[] | "- \(.)"' "$RELEASE_NOTES_JSON" >> RELEASE_NOTES.md

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            release-assets/*.apk
            RELEASE_NOTES.md

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false