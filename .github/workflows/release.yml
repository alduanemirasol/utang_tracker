name: Build and Release APKs

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release Android APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure signing keys
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "Warning: SIGNING_KEY_BASE64 is empty. Release build will fail unless signing is disabled."
            exit 1
          fi
          
          # Decode the keystore file to android/app/release.keystore
          echo "$SIGNING_KEY_BASE64" | base64 --decode > android/app/release.keystore
          
          # Create android/key.properties
          cat <<EOF > android/key.properties
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis and formatting
        run: flutter analyze

      - name: Run unit tests
        run: flutter test

      - name: Build ABI-split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Prepare assets for release
        run: |
          mkdir release-assets
          TAG_NAME="${{ github.ref_name }}"
          
          # Copy and rename ABI-split APKs
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-assets/utang-tracker-arm64-v8a-$TAG_NAME.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-assets/utang-tracker-armeabi-v7a-$TAG_NAME.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-assets/utang-tracker-x86_64-$TAG_NAME.apk
          
          # Copy and rename universal APK
          cp build/app/outputs/flutter-apk/app-release.apk release-assets/utang-tracker-universal-$TAG_NAME.apk

      - name: Validate RELEASE_NOTES.md exists
        run: |
          if [ ! -f RELEASE_NOTES.md ]; then
            echo "::error::RELEASE_NOTES.md not found. Create it with release notes before tagging."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
